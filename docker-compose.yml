services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: mistral
      PERSISTENCE_DB_PATH: backend/data/nudiscribe.db
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/srv/nudiscribe/backend/data
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-data:
