name: backend-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            fastapi \
            uvicorn[standard] \
            httpx \
            pydantic \
            pydantic-settings \
            python-dotenv \
            python-multipart \
            orjson \
            websockets

      - name: Compile backend files
        run: python -m compileall backend/app backend/tests

      - name: Run unit tests
        run: python -m unittest discover -s backend/tests -p "test_*.py"
